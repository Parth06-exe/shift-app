<script>

function parseSheet(ws){if(!ws||!ws['!ref'])return null;var range=XLSX.utils.decode_range(ws['!ref']),rows=[];for(var r=range.s.r;r<=range.e.r;r++){var row=[];for(var c=range.s.c;c<=range.e.c;c++){var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];row.push(cell?String(cell.v).trim():'')}rows.push(row)}if(!rows.length)return null;var months={january:1,jan:1,januar:1,february:2,feb:2,februar:2,march:3,mar:3,marec:3,april:4,apr:4,may:5,maj:5,june:6,jun:6,junij:6,july:7,jul:7,julij:7,august:8,aug:8,avgust:8,september:9,sep:9,october:10,oct:10,oktober:10,november:11,nov:11,december:12,dec:12},monthNum=new Date().getMonth()+1,year=new Date().getFullYear(),r0=rows[0].join(' ').toLowerCase();for(var k in months){if(r0.indexOf(k)>=0){monthNum=months[k];break}}var ym=rows[0].join(' ').match(/\d{4}/);if(ym)year=parseInt(ym[0],10);var headerRow=-1,nameCol=-1;for(var i=0;i<rows.length;i++){for(var j=0;j<rows[i].length;j++){if(rows[i][j].toLowerCase()==='ime'){headerRow=i;nameCol=j;break}}if(headerRow>=0)break}if(headerRow<0)return null;function isWeekdayRow(row){var words={mon:1,tue:1,wed:1,thu:1,fri:1,sat:1,sun:1,pon:1,tor:1,sre:1,cet:1,'\u010det':1,pet:1,sob:1,ned:1},hits=0;for(var x=nameCol+1;x<row.length;x++){if(words[String(row[x]||'').trim().toLowerCase()])hits++}return hits>=3}var dayRow=rows[headerRow],people=[],first=headerRow+1;if(rows[first]&&isWeekdayRow(rows[first]))first++;for(var ri=first;ri<rows.length;ri++){var row2=rows[ri],name=(row2[nameCol]||'').trim();if(!name||name.indexOf('---')===0)continue;var shifts={};for(var ci=nameCol+1;ci<dayRow.length;ci++){var day=parseInt(dayRow[ci],10);if(!day)continue;var parts=(row2[ci]||'').trim().split(/\s+/);if(parts.length>=2&&parts[0].toUpperCase()!=='X'&&parts[1].toUpperCase()!=='X'){var st=parseInt(parts[0],10),en=parseInt(parts[1],10);shifts[day]=!isNaN(st)&&!isNaN(en)?{start:st,end:en,overnight:st>=13&&en<=6,off:false}:{off:true}}else shifts[day]={off:true}}people.push({name:name,shifts:shifts})}return{people:people,mont function renderCards(parent,person,days,t,emptyIcon,emptyText){if(!days.length){addEmpty(parent,emptyIcon,emptyText);return}var list=el('div','slist');days.forEach(function(d){list.appendChild(makeCard(person,d,t))});parent.appendChild(list)}
function go(){if(!DATA){byId('lmsg').textContent=TR[L].loading;return}var raw=byId('ni').value.trim(),res=byId('res');clear(res);if(!raw){LAST_Q='';return}LAST_Q=raw;var q=raw.toLowerCase(),t=TR[L],found=null;for(var i=0;i<DATA.people.length;i++){var pn=DATA.people[i].name.toLowerCase(),words=q.split(' ');if(pn.indexOf(q)>=0||words.some(function(w){return w.length>1&&pn.indexOf(w)>=0})){found=DATA.people[i];break}}if(!found){addEmpty(res,'\u2315',t.nf,t.ns);return}var today=new Date(),todayDay=today.getDate(),isNow=DATA.monthNum===today.getMonth()+1&&DATA.year===today.getFullYear(),initials=found.name.split(' ').map(function(x){return x[0]||''}).join('').slice(0,2).toUpperCase(),head=el('div','ph'),avatar=el('div','av',initials),meta=el('div'),tabs=el('div','tabs'),content=el('div');meta.appendChild(el('div','pn',found.name));meta.appendChild(el('div','pm',t.mo[DATA.monthNum-1]+' '+DATA.year));head.appendChild(avatar);head.appendChild(meta);res.appendChild(head);['today','upcoming','old'].forEach(function(tab){var labels={today:t.tt,upcoming:t.tu,old:t.to},b=el('button','tab '+(TAB===tab?'on':''),labels[tab]);b.type='button';b.onclick=function(){TAB=tab;go()};tabs.appendChild(b)});res.appendChild(tabs);res.appendChild(content);var days=Object.keys(found.shifts).map(Number).sort(function(a,b){return a-b});if(TAB==='today'){var card=el('div','tcard'),ts=isNow?found.shifts[todayDay]:null;card.appendChild(el('div','tlbl',t.tl));if(!isNow){card.appendChild(el('div','tst','-'))}else if(!ts||ts.off){card.appendChild(el('div','tst','\u2713 '+t.off))}else{var status=el('div','tst','\u2713 '+t.wk);if(ts.overnight)status.appendChild(el('span','bdg','\u23f1 '+t.on));card.appendChild(status);card.appendChild(el('div','ttm',ts.start+':00 - '+ts.end+':00'))}content.appendChild(card)}else if(TAB==='upcoming'){renderCards(content,found,isNow?days.filter(function(d){return d>todayDay}):days,t,'\u25a1',t.nu)}else{renderCards(content,found,isNow?days.filter(function(d){return d<todayDa document.querySelectorAll('[data-lang]').forEach(function(b){b.addEventListener('click',function(){setL(b.getAttribute('data-lang'))})});byId('modalTheme').addEventListener('click',togTheme);byId('htheme').addEventListener('click',togTheme);byId('sbtn').addEventListener('click',go);byId('ni').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
