<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shift Lookup · Pregled izmen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f4f4f4;--surface:#fff;--text:#1a1a1a;--sub:#555;--accent:#008080;--accent2:#005f5f;--border:#ddd;--card:#fff;--off:#f0f0f0;--modal:rgba(0,0,0,0.55);--lb:#1a1a1a;--lt:#fff;--lbo:#444;}
[data-theme="dark"]{--bg:#121212;--surface:#1e1e1e;--text:#f0f0f0;--sub:#aaa;--accent:#00b3b3;--accent2:#009090;--border:#333;--card:#252525;--off:#1a1a1a;--modal:rgba(0,0,0,0.85);--lb:#1a1a1a;--lt:#fff;--lbo:#555;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
/* MODAL */
#modal{position:fixed;inset:0;background:var(--modal);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(8px);}
.mbox{background:var(--surface);border-radius:22px;padding:36px 32px;width:320px;text-align:center;box-shadow:0 10px 50px rgba(0,0,0,0.4);}
.mtop{display:flex;justify-content:flex-end;margin-bottom:14px;}
.ttog{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;font-size:.78rem;color:var(--text);display:flex;align-items:center;gap:5px;}
.micon{font-size:2.8rem;margin-bottom:8px;}
.mtitle{font-size:1.05rem;font-weight:700;margin-bottom:3px;}
.msub{font-size:.8rem;color:var(--sub);margin-bottom:26px;}
.lopts{display:flex;gap:14px;justify-content:center;}
.lbtn{background:var(--lb);color:var(--lt);border:2px solid var(--lbo);border-radius:14px;width:120px;height:88px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:border-color .2s,transform .15s;}
.lbtn:hover{border-color:var(--accent);transform:translateY(-3px);}
.lcode{font-size:1.9rem;font-weight:800;letter-spacing:2px;}
.lname{font-size:.68rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;}
/* APP */
#app{display:none;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hl{display:flex;align-items:center;gap:9px;}
.hicon{font-size:1.4rem;}
.htitle{font-size:.95rem;font-weight:700;color:var(--accent);}
.hr{display:flex;gap:8px;align-items:center;}
.hbtn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:.76rem;cursor:pointer;color:var(--text);transition:border-color .2s;}
.hbtn:hover{border-color:var(--accent);}
.hbtn.on{border-color:var(--accent);color:var(--accent);font-weight:700;}
/* SEARCH */
.ss{max-width:580px;margin:44px auto 0;padding:0 20px;text-align:center;}
.sg{font-size:1.55rem;font-weight:700;margin-bottom:6px;}
.ssub{font-size:.88rem;color:var(--sub);margin-bottom:22px;}
.sb{display:flex;gap:10px;}
.sb input{flex:1;padding:13px 18px;border:2px solid var(--border);border-radius:12px;font-size:1rem;background:var(--surface);color:var(--text);outline:none;transition:border-color .2s;}
.sb input:focus{border-color:var(--accent);}
.sb button{padding:13px 22px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:.92rem;font-weight:600;cursor:pointer;transition:background .2s;}
.sb button:hover{background:var(--accent2);}
.uhint{max-width:580px;margin:10px auto 0;padding:0 20px;text-align:center;font-size:.8rem;color:var(--sub);}
.uhint a{color:var(--accent);cursor:pointer;text-decoration:underline;}
/* RESULTS */
.rs{max-width:680px;margin:30px auto;padding:0 20px 70px;}
.ph{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.av{width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;}
.pn{font-size:1.15rem;font-weight:700;}
.pm{font-size:.8rem;color:var(--sub);margin-top:2px;}
.tabs{display:flex;gap:10px;margin-bottom:18px;}
.tab{flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.tcard{border-radius:16px;padding:20px 22px;margin-bottom:14px;border:2px solid var(--accent);background:var(--card);}
.tlbl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:7px;}
.tst{font-size:1.35rem;font-weight:700;}
.ttm{font-size:.92rem;color:var(--sub);margin-top:4px;}
.bdg{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;background:#ff8c00;color:#fff;}
.slist{display:flex;flex-direction:column;gap:9px;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 17px;display:flex;align-items:center;gap:13px;}
.sc.off{background:var(--off);opacity:.65;}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dw{background:var(--accent);}
.do{background:#888;}
.dn{background:#ff8c00;}
.dc{min-width:100px;}
.dd{font-size:.8rem;color:var(--sub);}
.dw2{font-size:.72rem;color:var(--sub);margin-top:1px;}
.dt{font-size:.92rem;font-weight:600;}
.dn2{font-size:.72rem;color:#ff8c00;margin-top:2px;}
.empty{text-align:center;padding:48px 20px;color:var(--sub);}
.eico{font-size:3rem;margin-bottom:12px;}
/* ADMIN */
#adm{display:none;max-width:480px;margin:40px auto;padding:0 20px 60px;}
.ac{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;}
.at{font-size:1.05rem;font-weight:700;margin-bottom:5px;}
.as{font-size:.83rem;color:var(--sub);margin-bottom:20px;}
.dz{border:2px dashed var(--border);border-radius:12px;padding:34px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:12px;}
.dz:hover,.dz.over{border-color:var(--accent);background:rgba(0,128,128,.06);}
.dzi{font-size:2rem;margin-bottom:8px;}
.dz p{font-size:.85rem;color:var(--sub);}
.dz strong{color:var(--accent);}
#fi{display:none;}
.ast{font-size:.83rem;margin-top:10px;padding:10px 14px;border-radius:8px;display:none;}
.ast.ok{background:#d4edda;color:#155724;display:block;}
.ast.er{background:#f8d7da;color:#721c24;display:block;}
[data-theme="dark"] .ast.ok{background:#1a3a1a;color:#a3d9a5;}
[data-theme="dark"] .ast.er{background:#3a1a1a;color:#f5a5a5;}
.li{font-size:.78rem;color:var(--sub);margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.bb{margin-top:16px;width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--text);font-size:.88rem;cursor:pointer;transition:border-color .2s;}
.bb:hover{border-color:var(--accent);}
@media(max-width:480px){.mbox{width:92vw;padding:26px 16px;}.lbtn{width:105px;height:80px;}.sg{font-size:1.2rem;}.tab{font-size:.78rem;padding:9px 6px;}}
</style>
</head>
<body data-theme="dark">

<div id="modal">
  <div class="mbox">
    <div class="mtop">
      <button class="ttog" onclick="togTheme()"><span id="ticon">☀️</span><span id="tlbl">Light</span></button>
    </div>
    <div class="micon">📅</div>
    <div class="mtitle">Shift Lookup · Pregled izmen</div>
    <div class="msub">Choose language / Izberite jezik</div>
    <div class="lopts">
      <button class="lbtn" onclick="setL('en')"><span class="lcode">EN</span><span class="lname">English</span></button>
      <button class="lbtn" onclick="setL('sl')"><span class="lcode">SI</span><span class="lname">Slovenščina</span></button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="hl"><span class="hicon">📅</span><span class="htitle" id="htitle">Shift Lookup</span></div>
    <div class="hr">
      <button class="hbtn" id="ben" onclick="setL('en')">EN</button>
      <button class="hbtn" id="bsl" onclick="setL('sl')">SI</button>
      <button class="hbtn" onclick="togTheme()" id="htheme">☀️</button>
      <button class="hbtn" onclick="goAdmin()" id="hadm">⚙️ <span id="hadmlbl">Admin</span></button>
    </div>
  </header>

  <div id="sv">
    <div class="ss">
      <div class="sg" id="greet"></div>
      <div class="ssub" id="ssub"></div>
      <div class="sb">
        <input id="ni" type="text" autocomplete="off" onkeydown="if(event.key==='Enter')go()"/>
        <button onclick="go()" id="sbtn">Search</button>
      </div>
    </div>
    <div class="uhint" id="uh"><span id="uht"></span> <a onclick="goAdmin()" id="uhl"></a><span id="uhr"></span></div>
    <div class="rs" id="res"></div>
  </div>

  <div id="adm">
    <div class="ac">
      <div class="at" id="at"></div>
      <div class="as" id="as2"></div>
      <div class="dz" id="dz" onclick="document.getElementById('fi').click()" ondragover="dzo(event)" ondragleave="dzl()" ondrop="dzd(event)">
        <div class="dzi">📂</div>
        <p><strong id="dzc"></strong> <span id="dzo2"></span></p>
        <p id="dzh" style="margin-top:5px;font-size:.75rem;"></p>
      </div>
      <input type="file" id="fi" accept=".xlsx,.xls" onchange="hf(this.files[0])"/>
      <div class="ast" id="ast"></div>
      <div class="li" id="li"></div>
      <button class="bb" onclick="goSearch()" id="bb"></button>
    </div>
  </div>
</div>

<script>
const TR={
  en:{
    title:"Shift Lookup",gm:"Good morning 👋",ga:"Good afternoon 👋",ge:"Good evening 👋",gn:"Good night 👋",
    sub:"Enter your name to see your shifts",ph:"Your name...",sb:"Search",
    ht:"No schedule loaded.",hl:"Upload Excel file",hr:" to get started.",
    at:"Upload Shift Schedule",as:"Upload your monthly .xlsx file. The schedule updates instantly.",
    dc:"Click to choose",dor:"or drag & drop",dh:"Supports .xlsx files",
    bb:"← Back",al:"Admin",
    tt:"Today",tu:"Upcoming",to:"Old Shifts",
    tl:"TODAY",wk:"Working",off:"Day Off",on:"ends next day",
    nt:"No shift today",nu:"No upcoming shifts",no:"No past shifts",
    nf:"Name not found in the schedule.",ns:"Check spelling or ask your supervisor.",
    ok:"Schedule loaded successfully!",li:"Loaded",pp:"people,",fm:"for",
    tl2:"Light",td:"Dark",
    mo:["January","February","March","April","May","June","July","August","September","October","November","December"],
    dw:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
  },
  sl:{
    title:"Pregled izmen",gm:"Dobro jutro 👋",ga:"Dober dan 👋",ge:"Dober večer 👋",gn:"Lahko noč 👋",
    sub:"Vnesite ime za ogled vaših izmen",ph:"Vaše ime...",sb:"Išči",
    ht:"Urnik ni naložen.",hl:"Naložite Excel datoteko",hr:" za začetek.",
    at:"Naložite urnik izmen",as:"Naložite mesečno .xlsx datoteko. Urnik se takoj posodobi.",
    dc:"Kliknite za izbiro",dor:"ali povlecite in spustite",dh:"Podpira .xlsx datoteke",
    bb:"← Nazaj",al:"Admin",
    tt:"Danes",tu:"Prihajajoče",to:"Stare izmene",
    tl:"DANES",wk:"Delam",off:"Prost dan",on:"konča naslednji dan",
    nt:"Danes ni izmene",nu:"Ni prihajajočih izmen",no:"Ni starih izmen",
    nf:"Ime ni najdeno v urniku.",ns:"Preverite črkovanje ali vprašajte nadrejenega.",
    ok:"Urnik uspešno naložen!",li:"Naloženo",pp:"oseb,",fm:"za",
    tl2:"Svetla",td:"Temna",
    mo:["Januar","Februar","Marec","April","Maj","Junij","Julij","Avgust","September","Oktober","November","December"],
    dw:["Ned","Pon","Tor","Sre","Čet","Pet","Sob"]
  }
};

let L='en', THM='dark', DATA=null, TAB='today';

// ── THEME ──
function togTheme(){
  THM=THM==='dark'?'light':'dark';
  document.body.setAttribute('data-theme',THM);
  const ic=THM==='dark'?'☀️':'🌙';
  document.getElementById('ticon').textContent=ic;
  document.getElementById('htheme').textContent=ic;
  document.getElementById('tlbl').textContent=THM==='dark'?TR[L].tl2:TR[L].td;
}

// ── LANGUAGE ──
function setL(l){
  L=l;
  document.getElementById('modal').style.display='none';
  document.getElementById('app').style.display='block';
  applyT();
  setGreet();
  document.getElementById('ben').classList.toggle('on',L==='en');
  document.getElementById('bsl').classList.toggle('on',L==='sl');
  document.getElementById('uh').style.display=DATA?'none':'block';
}

function applyT(){
  const t=TR[L];
  document.getElementById('htitle').textContent=t.title;
  document.getElementById('ssub').textContent=t.sub;
  document.getElementById('ni').placeholder=t.ph;
  document.getElementById('sbtn').textContent=t.sb;
  document.getElementById('hadmlbl').textContent=t.al;
  document.getElementById('at').textContent=t.at;
  document.getElementById('as2').textContent=t.as;
  document.getElementById('dzc').textContent=t.dc;
  document.getElementById('dzo2').textContent=t.dor;
  document.getElementById('dzh').textContent=t.dh;
  document.getElementById('bb').textContent=t.bb;
  document.getElementById('uht').textContent=t.ht;
  document.getElementById('uhl').textContent=t.hl;
  document.getElementById('uhr').textContent=t.hr;
  document.getElementById('tlbl').textContent=THM==='dark'?t.tl2:t.td;
  // re-render results if active
  if(DATA && document.getElementById('res').innerHTML!=='') go(true);
}

function setGreet(){
  const h=new Date().getHours(),t=TR[L];
  document.getElementById('greet').textContent=
    h>=5&&h<12?t.gm:h>=12&&h<17?t.ga:h>=17&&h<22?t.ge:t.gn;
}

// ── VIEWS ──
function goAdmin(){
  document.getElementById('sv').style.display='none';
  document.getElementById('adm').style.display='block';
}
function goSearch(){
  document.getElementById('adm').style.display='none';
  document.getElementById('sv').style.display='block';
}

// ── DRAG DROP ──
function dzo(e){e.preventDefault();document.getElementById('dz').classList.add('over');}
function dzl(){document.getElementById('dz').classList.remove('over');}
function dzd(e){e.preventDefault();dzl();hf(e.dataTransfer.files[0]);}

// ── FILE HANDLER ──
function hf(file){
  if(!file)return;
  const ast=document.getElementById('ast');
  ast.className='ast';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      DATA=parseSheet(ws);
      ast.className='ast ok';
      ast.textContent=TR[L].ok;
      const t=TR[L];
      document.getElementById('li').textContent=
        `${t.li} ${DATA.people.length} ${t.pp} ${t.fm} ${DATA.monthName} ${DATA.year}`;
      document.getElementById('uh').style.display='none';
    }catch(err){
      ast.className='ast er';
      ast.textContent='Error reading file: '+err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── EXCEL PARSER ──
function parseSheet(ws){
  const range=XLSX.utils.decode_range(ws['!ref']);
  const rows=[];
  for(let r=range.s.r;r<=range.e.r;r++){
    const row=[];
    for(let c=range.s.c;c<=range.e.c;c++){
      const cell=ws[XLSX.utils.encode_cell({r,c})];
      row.push(cell?String(cell.v).trim():'');
    }
    rows.push(row);
  }

  // Find month/year from row 0
  let monthNum=new Date().getMonth()+1, year=new Date().getFullYear(), monthName='';
  const slMonths={januar:1,februar:2,marec:3,april:4,maj:5,junij
