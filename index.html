t);color:var(--accent);font-weight:700}.ss{max-width:580px;margin:44px auto 0;padding:0 20px;text-align:center}.sg{font-size:1.55rem;font-weight:700;margin-bottom:6px}.ssub{font-size:.88rem;color:var(--sub);margin-bottom:22px}.sb{display:grid;grid-template-columns:1fr 140px;gap:10px}.sb input{padding:13px 18px;border:2px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);outline:none}.sb input:focus{border-color:var(--accent)}.sb button{grid-column:1/-1;padding:13px 22px;background:var(--accent);color:#fff;border:0;border-radius:12px;font-weight:600}.sb button:hover{background:var(--accent2)}.lmsg{max-width:580px;margin:12px auto 0;padding:0 20px;text-align:center;font-size:.82rem;color:var(--sub)}.rs{max-width:680px;margin:30px auto;padding:0 20px 70px}.ph{display:flex;align-items:center;gap:14px;margin-bottom:18px}.av{width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;flex-shrink:0}.pn{font-size:1.15rem;font-weight:700}.pm{font-size:.8rem;color:var(--sub);margin-top:2px}.tabs{display:flex;gap:10px;margin-bottom:18px}.tab{flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem;font-weight:600}.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}.tcard{border-radius:16px;padding:20px 22px;margin-bottom:14px;border:2px solid var(--accent);background:var(--card)}.tlbl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:7px}.tst{font-size:1.35rem;font-weight:700}.ttm{font-size:.92rem;color:var(--sub);margin-top:4px}.bdg{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;background:#ff8c00;color:#fff}.slist{display:flex;flex-direction:column;gap:9px}.sc{background:var(--card);border:1px solid var(--bord <body data-theme="dark">
<div id="modal"><div class="mbox"><div class="mtop"><button class="ttog" id="modalTheme" type="button"><span id="ticon">&#9728;</span> <span id="tlbl">Light</span></button></div><div class="micon">&#128197;</div><div class="mtitle">Shift Lookup | Pregled izmen</div><div class="msub">Choose language &middot; Izberite jezik</div><div class="lopts"><button class="lbtn" type="button" data-lang="en"><span class="lcode">EN</span><span class="lname">English</span></button><button class="lbtn" type="button" data-lang="sl"><span class="lcode">SI</span><span class="lname">Sloven&#353;&#269;ina</span></button></div></div></div>
<div id="app"><header><div class="hl"><span>&#128197;</span><span class="htitle" id="htitle">Shift Lookup</span></div><div class="hr"><button class="hbtn" id="ben" type="button" data-lang="en">EN</button><button class="hbtn" id="bsl" type="button" data-lang="sl">SI</button><button class="hbtn" id="htheme" type="button">&#9728;</button></div></header><main><section class="ss"><div class="sg" id="greet"></div><div class="ssub" id="ssub"></div><div class="sb"><input id="ni" type="text" autocomplete="off"><input id="code" type="password" autocomplete="off"><button id="sbtn" type="button">Search</button></div></section><div class="lmsg" id="lmsg"></div><div class="rs" id="res"></div></main></div>
<script>
var API_URL='https://shift-gyere2btfvgsb7cb.austriaeast-01.azurewebsites.net/api/lookup';
var TR={en:{title:'Shift Lookup',gm:'Good morning, ',ga:'Good afternoon, ',ge:'Good evening, ',gn:'Good night, ',sub:'Enter your name to see your shifts',ph:'Your name...',code:'Code (optional)',sb:'Search',tt:'Today',tu:'Upcoming',to:'Old Shifts',tl:'TODAY',wk:'Working',off:'Day Off',on:'ends next day',nu:'No upcoming shifts',no:'No past shifts',nf:'Name not found in the schedule.',ns:'Check spelling or ask your supervisor.',cfg:'API URL is not configured yet.',loading:'Searching schedule...',err:'Could not load shifts. Check the API setup.',tl2:'Light',td:'Dark',mo:['January','February','March','April','May','June','July','August','September','October','November','December'],dw:['Sun','Mon','Tue','Wed','Thu','Fri','Sat']},sl:{title:'Pregled izmen',gm:'Dobro jutro, ',ga:'Dober dan, ',ge:'Dober ve\u010der, ',gn:'Lahko no\u010d, ',sub:'Vnesite ime za ogled va\u0161ih izmen',ph:'Va\u0161e ime...',code:'Koda (neobvezno)',sb:'I\u0161\u010di',tt:'Danes',tu:'Prihajajo\u010de',to:'Stare izmene',tl:'DANES',wk:'Delam',off:'Prost dan',on:'kon\u010da naslednji dan',nu:'Ni prihajajo\u010dih izmen',no:'Ni starih izmen',nf:'Ime ni najdeno v urniku.',ns:'Preverite \u010drkovanje ali vpra\u0161ajte nadrejenega.',cfg:'API URL \u0161e ni nastavljen.',loading:'I\u0161\u010dem urnik...',err:'Izmen ni bilo mogo\u010de nalo\u017eiti. Preverite API nastavitve.',tl2:'Svetla',td:'Temna',mo:['Januar','Februar','Marec','April','Maj','Junij','Julij','Avgust','September','Oktober','November','December'],dw:['Ned','Pon','Tor','Sre','\u010cet','Pet','Sob']}};
var L='en',THM='dark',TAB='today',LAST=null;
function byId(id){return document.getElementById(id)}
function el(tag,cls,text){var n=document.createElement(tag);if(cls)n.className=cls;if(text!==undefined)n.textContent=text;return n}
function clear(n){while(n.firstChild)n.removeChild(n.firstChild)}
function togTheme(){THM=THM==='dark'?'light':'dark';document.body.setAttribute('data-theme',THM);var ic=THM==='dark'?'\u2600':'\u263e';byId('ticon').textContent=ic;byId('htheme').textContent=ic;byId('tlbl').textContent=THM==='dark'?TR[L].tl2:TR[L].td}
function setL(l){L=l;byId('modal').style.display='none';byId('app').style.display='block';applyT();setGreet();byId('ben').classList.toggle('on',L==='en');byId('bsl').classList.toggle('on',L==='sl');if(LAST)render(LAST)}
function applyT(){var t=TR[L];byId('htitle').textContent=t.title;byId('ssub').textContent=t.sub;byId('ni').placeholder=t.ph;byId('code').placeholder=t.code;byId('sbtn').textContent=t.sb;byId('tlbl').textContent=THM==='dark'?t.tl2:t.td}
function setGreet(){var h=new Date().getHours(),t=TR[L],g=h>=5&&h<12?t.gm:h>=12&&h<17?t.ga:h>=17&&h<22?t.ge:t.gn;byId('greet').textContent=g}
function addEmpty(parent,icon,text,sub){var box=el('div','empty'),i=el('div','eico',icon);box.appendChild(i);box.appendChild(el('div','',text));if(sub){var s=el('div','',sub);s.style.cssText='font-size:.82rem;margin-top:6px;color:var(--sub)';box.appendChild(s)}parent.appendChild(box)}
function makeCard(shift,t){var card=el('div','sc'+(shift.off?' off':'')),dot=el('div','dot '+(shift.off?'do':shift.overnight?'dn':'dw')),dc=el('div','dc'),dt=new Date(shift.year,shift.monthNum-1,shift.day);dc.appendChild(el('div','dd',shift.day+' '+t.mo[shift.monthNum-1]));dc.appendChild(el('div','dw2',t.dw[dt.getDay()]));card.appendChild(dot);card.appendChild(dc);if(shift.off)card.appendChild(el('div','dt',t.off));else{var info=el('div');info.appendChild(el('div','dt',shift.start+':00 - '+shift.end+':00'));if(shift.overnight)info.appendChild(el('div','dn2','\u23f1 '+t.on));card.appendChild(info)}return card}
function renderCards(parent,shifts,t,emptyText){if(!shifts.length){addEmpty(parent,'\u25a1',emptyText);return}var list=el('div','slist');shifts.forEach(function(s){list.appendChild(makeCard(s,t))});parent.appendChild(list)}
function render(data){LAST=data;var t=TR[L],res=byId('res');clear(res);var today=new Date(),todayDay=today.getDate(),isNow=data.monthNum===today.getMonth()+1&&data.year===today.getFullYear(),initials=data.name.split(' ').map(function(x){return x[0]||''}).join('').slice(0,2).toUpperCase(),head=el('div','ph'),avatar=el('div','av',initials),meta=el('div'),tabs=el('div','tabs'),content=el('div');meta.appendChild(el('div','pn',data.name));meta.appendChild(el('div','pm',t.mo[data.monthNum-1]+' '+data.year));head.appendChild(avatar);head.appendChild(meta);res.appendChild(head);['today','upcoming','old'].forEach(function(tab){var labels={today:t.tt,upcoming:t.tu,old:t.to},b=el('button','tab '+(TAB===tab?'on':''),labels[tab]);b.type='button';b.onclick=function(){TAB=tab;render(data)};tabs.appendChild(b)});res.appendChild(tabs);res.appendChild(content);var shifts=data.shifts||[];if(TAB==='today'){var todayShift=isNow?shifts.find(function(s){return s.day===todayDay}):null,card=el('div','tcard');card.appendChild(el('div','tlbl',t.tl));if(!isNow){card.appendChild(el('div','tst','-'))}else if(!todayShift||todayShift.off){card.appendChild(el('div','tst','\u2713 '+t.off))}else{var status=el('div','tst','\u2713 '+t.wk);if(todayShift.overnight)status.appendChild(el('span','bdg','\u23f1 '+t.on));card.appendChild(status);card.appendChild(el('div','ttm',todayShift.start+':00 - '+todayShift.end+':00'))}content.appendChild(card)}else if(TAB==='upcoming'){renderCards(content,isNow?shifts.filter(function(s){return s.day>todayDay}):shifts,t,t.nu)}else{renderCards(content,isNow?shifts.filter(function(s){return s.day<todayDay}):shifts,t,t.no)}}
async function go(){var t=TR[L],name=byId('ni').value.trim(),code=byId('code').value.trim(),msg=byId('lmsg'),res=byId('res');clear(res);LAST=null;if(!name)return;if(API_URL.indexOf('YOUR-FUNCTION-APP')>=0){msg.textContent=t.cfg;return}msg.textContent=t.loading;try{var url=API_URL+'?name='+encodeURIComponent(name);if(code)url+='&code='+encodeURIComponent(code);var r=await fetch(url);var data=await r.json().catch(function(){return{}});if(!r.ok){addEmpty(res,'\u2315',data.error||t.nf,t.ns);msg.textContent='';return}msg.textContent='';render(data)}catch(e){msg.textContent=t.err}}
document.querySelectorAll('[data-lang]').forEach(function(b){b.addEventListener('click',function(){setL(b.getAttribute('data-lang'))})});byId('modalTheme').addEventListener('click',togTheme);byId('htheme').addEventListener('click',togTheme);byId('sbtn').addEventListener('click',go);byId('ni').addEventListener('keydown',function(e){if(e.key==='Enter')go()});byId('code').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
</script>
